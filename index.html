<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Redirecting...</title>
    <!-- Instant Redirect to dashboard.php -->
    <meta http-equiv="refresh" content="0;url=dashboard.php" />
    <script>
        window.location.href = "dashboard.php";
    </script>
</head>

<body style="background-color: #0b0f19; color: #94a3b8; font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0;">
    <div style="text-align: center;">
        <div style="border: 4px solid #1e293b; border-top: 4px solid #6366f1; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 0 auto 20px;"></div>
        <p>Redirecting to dashboard...</p>
        <p style="font-size: 0.85rem; color: #64748b;">If it doesn’t redirect, <a href="dashboard.php" style="color: #6366f1; text-decoration: none;">click here</a>.</p>
    </div>
    <style>
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</body>

</html>
