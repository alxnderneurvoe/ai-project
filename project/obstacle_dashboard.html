<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Obstacle Watch</title>
<link rel="icon" href="data:,">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0A0E14;
    --panel: #111722;
    --panel-2: #161D2B;
    --border: #232D40;
    --phosphor: #4ADE80;
    --phosphor-dim: #1F4D34;
    --amber: #FBBF24;
    --amber-dim: #4D3A14;
    --text: #E4E9F2;
    --text-muted: #6B7A94;
    --font-display: "Space Grotesk", sans-serif;
    --font-mono: "JetBrains Mono", monospace;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-display);
    min-height: 100vh;
    background-image:
      linear-gradient(rgba(74,222,128,0.02) 1px, transparent 1px),
      linear-gradient(90deg, rgba(74,222,128,0.02) 1px, transparent 1px);
    background-size: 24px 24px;
  }

  .wrap {
    max-width: 960px;
    margin: 0 auto;
    padding: 32px 20px 60px;
  }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 28px;
    flex-wrap: wrap;
    gap: 12px;
  }

  .title-block h1 {
    font-size: 22px;
    font-weight: 600;
    letter-spacing: -0.01em;
  }

  .title-block .sub {
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 2px;
  }

  .conn-badge {
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: var(--font-mono);
    font-size: 12px;
    padding: 8px 14px;
    border-radius: 999px;
    border: 1px solid var(--border);
    background: var(--panel);
  }

  .conn-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #EF4444;
    transition: background 0.3s ease;
  }
  .conn-dot.on { background: var(--phosphor); box-shadow: 0 0 8px var(--phosphor); }

  .setup-bar {
    display: flex;
    gap: 8px;
    margin-bottom: 28px;
    flex-wrap: wrap;
  }

  .setup-bar input {
    flex: 1;
    min-width: 220px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 11px 14px;
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 13px;
  }
  .setup-bar input:focus { outline: 2px solid var(--phosphor); outline-offset: 1px; }
  .setup-bar input::placeholder { color: var(--text-muted); }

  .setup-bar button {
    background: var(--phosphor);
    color: #06170D;
    border: none;
    border-radius: 8px;
    padding: 0 20px;
    font-family: var(--font-display);
    font-weight: 600;
    font-size: 13px;
    cursor: pointer;
    transition: filter 0.15s ease;
  }
  .setup-bar button:hover { filter: brightness(1.1); }
  .setup-bar button:focus-visible { outline: 2px solid var(--text); outline-offset: 2px; }

  .radar-panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 40px 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
    margin-bottom: 24px;
    position: relative;
    overflow: hidden;
  }

  .radar-scope {
    width: 220px;
    height: 220px;
    position: relative;
  }

  .radar-scope svg { width: 100%; height: 100%; }

  .ring { fill: none; stroke: var(--phosphor-dim); stroke-width: 1; }

  .sweep {
    transform-origin: 110px 110px;
    animation: spin 3.2s linear infinite;
  }
  body.detected .sweep { animation-duration: 1s; }

  @keyframes spin { to { transform: rotate(360deg); } }

  .sweep-gradient-fill { fill: url(#sweepGradient); }

  .center-dot {
    fill: var(--phosphor);
    transition: fill 0.2s ease;
  }
  body.detected .center-dot { fill: var(--amber); }

  .status-text {
    font-family: var(--font-mono);
    font-size: 15px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--phosphor);
    text-align: center;
    transition: color 0.2s ease;
  }
  body.detected .status-text { color: var(--amber); }

  .status-text .big {
    display: block;
    font-family: var(--font-display);
    font-size: 32px;
    letter-spacing: -0.02em;
    text-transform: none;
    margin-top: 6px;
    font-weight: 700;
  }

  .status-meta {
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--text-muted);
  }

  @media (prefers-reduced-motion: reduce) {
    .sweep { animation: none; }
  }

  .actions {
    display: flex;
    gap: 10px;
  }

  .btn-ghost {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-muted);
    padding: 9px 16px;
    border-radius: 8px;
    font-family: var(--font-mono);
    font-size: 12px;
    cursor: pointer;
    transition: all 0.15s ease;
  }
  .btn-ghost:hover { border-color: var(--phosphor); color: var(--phosphor); }
  .btn-ghost:focus-visible { outline: 2px solid var(--phosphor); outline-offset: 2px; }

  .log-panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
  }

  .log-header {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .log-header h2 {
    font-size: 14px;
    font-weight: 600;
  }

  .log-header .count {
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--text-muted);
  }

  .log-list {
    max-height: 360px;
    overflow-y: auto;
  }

  .log-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 20px;
    border-bottom: 1px solid var(--panel-2);
    font-family: var(--font-mono);
    font-size: 13px;
  }
  .log-row:last-child { border-bottom: none; }

  .log-icon {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .log-icon.detected { background: var(--amber); box-shadow: 0 0 6px var(--amber); }
  .log-icon.clear { background: var(--phosphor); }

  .log-label {
    flex: 1;
    color: var(--text);
  }
  .log-label.detected-text { color: var(--amber); }

  .log-time {
    color: var(--text-muted);
    font-size: 12px;
  }

  .empty-state {
    padding: 40px 20px;
    text-align: center;
    color: var(--text-muted);
    font-family: var(--font-mono);
    font-size: 13px;
  }

  ::-webkit-scrollbar { width: 8px; }
  ::-webkit-scrollbar-track { background: var(--panel); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
</style>
</head>
<body>

<div class="wrap">

  <header>
    <div class="title-block">
      <h1>Obstacle Watch</h1>
      <div class="sub">// live monitor &mdash; ESP32 IR sensor</div>
    </div>
    <div class="conn-badge">
      <span class="conn-dot" id="connDot"></span>
      <span id="connLabel">Terputus</span>
    </div>
  </header>

  <div class="setup-bar">
    <input type="text" id="ipInput" placeholder="IP ESP32, contoh: 192.168.1.50" />
    <button id="connectBtn">Hubungkan</button>
  </div>

  <div class="radar-panel">
    <div class="radar-scope">
      <svg viewBox="0 0 220 220">
        <defs>
          <linearGradient id="sweepGradient" x1="0" y1="0" x2="1" y2="0">
            <stop offset="0%" stop-color="#4ADE80" stop-opacity="0"/>
            <stop offset="100%" stop-color="#4ADE80" stop-opacity="0.35"/>
          </linearGradient>
        </defs>
        <circle class="ring" cx="110" cy="110" r="100"/>
        <circle class="ring" cx="110" cy="110" r="72"/>
        <circle class="ring" cx="110" cy="110" r="44"/>
        <g class="sweep">
          <path class="sweep-gradient-fill" d="M 110 110 L 110 10 A 100 100 0 0 1 195.7 60 Z"/>
        </g>
        <circle class="center-dot" cx="110" cy="110" r="7"/>
      </svg>
    </div>

    <div class="status-text" id="statusText">
      Menunggu koneksi
      <span class="big" id="statusBig">&mdash;</span>
    </div>
    <div class="status-meta" id="statusMeta">Hubungkan ke ESP32 untuk mulai memantau</div>

    <div class="actions">
      <button class="btn-ghost" id="testBuzzerBtn">Tes Buzzer</button>
      <button class="btn-ghost" id="clearLogBtn">Bersihkan Log</button>
    </div>
  </div>

  <div class="log-panel">
    <div class="log-header">
      <h2>Riwayat Deteksi</h2>
      <span class="count" id="logCount">0 entri</span>
    </div>
    <div class="log-list" id="logList">
      <div class="empty-state">Belum ada riwayat. Menunggu data dari sensor&hellip;</div>
    </div>
  </div>

</div>

<script>
  let ws = null;
  let events = [];

  const connDot = document.getElementById('connDot');
  const connLabel = document.getElementById('connLabel');
  const ipInput = document.getElementById('ipInput');
  const connectBtn = document.getElementById('connectBtn');
  const statusText = document.getElementById('statusText');
  const statusBig = document.getElementById('statusBig');
  const statusMeta = document.getElementById('statusMeta');
  const logList = document.getElementById('logList');
  const logCount = document.getElementById('logCount');
  const testBuzzerBtn = document.getElementById('testBuzzerBtn');
  const clearLogBtn = document.getElementById('clearLogBtn');

  // Artifacts tidak boleh pakai localStorage asli - simpan di memory saja
  let memoryStore = {};
  function localStorage_fallback_get(key) { return memoryStore[key] || ''; }
  function localStorage_fallback_set(key, val) { memoryStore[key] = val; }

  const savedIp = localStorage_fallback_get('esp32_ip');
  if (savedIp) ipInput.value = savedIp;

  connectBtn.addEventListener('click', () => {
    const ip = ipInput.value.trim();
    if (!ip) return;
    localStorage_fallback_set('esp32_ip', ip);
    connect(ip);
  });

  function connect(ip) {
    if (ws) { ws.close(); }
    updateConnUI(false, 'Menghubungkan...');

    try {
      ws = new WebSocket('ws://' + ip + ':81/');
    } catch (e) {
      updateConnUI(false, 'Alamat tidak valid');
      return;
    }

    ws.onopen = () => updateConnUI(true, 'Terhubung');
    ws.onclose = () => updateConnUI(false, 'Terputus');
    ws.onerror = () => updateConnUI(false, 'Gagal terhubung');

    ws.onmessage = (msg) => {
      try {
        const data = JSON.parse(msg.data);
        if (data.type === 'history') {
          events = data.events || [];
          renderLog();
        } else if (data.type === 'state') {
          applyState(data.status === 'detected', data.timestamp);
          events.push({ status: data.status, timestamp: data.timestamp });
          if (events.length > 50) events.shift();
          renderLog();
        }
      } catch (e) {
        console.error('Pesan tidak valid dari ESP32:', msg.data);
      }
    };
  }

  function updateConnUI(connected, label) {
    connDot.classList.toggle('on', connected);
    connLabel.textContent = label;
  }

  function applyState(detected, timestamp) {
    document.body.classList.toggle('detected', detected);
    statusText.childNodes[0].textContent = detected ? 'Peringatan' : 'Status normal';
    statusBig.textContent = detected ? 'HALANGAN TERDETEKSI' : 'AREA BERSIH';
    statusMeta.textContent = 'Update terakhir: ' + (timestamp || '-');
  }

  function renderLog() {
    logCount.textContent = events.length + ' entri';
    if (events.length === 0) {
      logList.innerHTML = '<div class="empty-state">Belum ada riwayat. Menunggu data dari sensor&hellip;</div>';
      return;
    }
    const rows = events.slice().reverse().map(ev => {
      const isDetected = ev.status === 'detected';
      return `<div class="log-row">
        <span class="log-icon ${isDetected ? 'detected' : 'clear'}"></span>
        <span class="log-label ${isDetected ? 'detected-text' : ''}">${isDetected ? 'Halangan terdeteksi' : 'Area kembali bersih'}</span>
        <span class="log-time">${ev.timestamp}</span>
      </div>`;
    }).join('');
    logList.innerHTML = rows;
  }

  testBuzzerBtn.addEventListener('click', () => {
    if (ws && ws.readyState === WebSocket.OPEN) {
      ws.send(JSON.stringify({ cmd: 'buzzer_test' }));
    }
  });

  clearLogBtn.addEventListener('click', () => {
    events = [];
    renderLog();
  });
</script>

</body>
</html>
